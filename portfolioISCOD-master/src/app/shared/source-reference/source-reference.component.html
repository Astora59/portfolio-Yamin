<article class="rounded-lg bg-gray-800 p-4">
  <p>
    <strong>{{ title }}</strong>
  </p>
  <p *ngIf="meta" class="text-sm text-gray-300">
    {{ meta }}
  </p>
  <p>
    <a
      [href]="href"
      target="_blank"
      rel="noopener noreferrer"
    >
      {{ linkText }}
    </a>
  </p>
</article>
